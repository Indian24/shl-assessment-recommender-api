openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: SHL Assessment Recommender chat
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health:
    get:
      operationId: healthCheckAlias
      tags: [health]
      summary: Health check alias
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /chat:
    post:
      operationId: chat
      tags: [chat]
      summary: SHL Assessment Recommender chat
      description: Conversational endpoint for recommending SHL assessments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
      required:
        - messages
    AssessmentRecommendation:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        test_type:
          type: string
      required:
        - name
        - url
        - test_type
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentRecommendation"
        end_of_conversation:
          type: boolean
      required:
        - reply
        - recommendations
        - end_of_conversation
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
